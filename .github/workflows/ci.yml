name: CI + Docker Build & Push

on:
  push:
    branches: [develop]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm run test:unit

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test   # ensures this runs only after test job

    if: ${{ success() }}  # only run if previous job succeeded

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/serveio-userService-backend:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/serveio-userService-backend:latest
