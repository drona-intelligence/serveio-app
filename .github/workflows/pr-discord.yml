name: Notify Discord on PR

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send PR notification to Discord
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"🚨 **New Pull Request!**\n\n📌 Title: ${{ github.event.pull_request.title }}\n👤 Author: ${{ github.event.pull_request.user.login }}\n🔗 URL: ${{ github.event.pull_request.html_url }}\"
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
