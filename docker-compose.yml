services:
  users-service-api:
    image: dronahub/serveio-userservice-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://serveio:serveio@db:5432/serveio?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: serveio
      POSTGRES_USER: serveio
      POSTGRES_PASSWORD: serveio
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serveio -d serveio"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data: